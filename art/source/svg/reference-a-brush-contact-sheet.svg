<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.032" numOctaves="3" seed="17"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.11"/>
      </feComponentTransfer>
    </filter>
    <pattern id="rain" width="34" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(14)">
      <line x1="10" y1="0" x2="10" y2="18" stroke="#B9CBE0" stroke-width="1" opacity="0.22"/>
      <line x1="24" y1="6" x2="24" y2="32" stroke="#00E5FF" stroke-width="0.8" opacity="0.12"/>
    </pattern>
    
  </defs>
  <rect width="960" height="540" fill="#0B1020"/>
  <radialGradient id="skyGlow" cx="46%" cy="20%" r="70%">
    <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.20"/>
    <stop offset="42%" stop-color="#162435" stop-opacity="0.40"/>
    <stop offset="100%" stop-color="#050508" stop-opacity="1"/>
  </radialGradient>
  <rect width="960" height="540" fill="url(#skyGlow)"/>
  <rect width="960" height="540" fill="url(#rain)" opacity="0.34"/>
