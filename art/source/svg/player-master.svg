<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.032" numOctaves="3" seed="17"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.11"/>
      </feComponentTransfer>
    </filter>
    <pattern id="rain" width="34" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(14)">
      <line x1="10" y1="0" x2="10" y2="18" stroke="#B9CBE0" stroke-width="1" opacity="0.22"/>
      <line x1="24" y1="6" x2="24" y2="32" stroke="#00E5FF" stroke-width="0.8" opacity="0.12"/>
    </pattern>
    
  </defs>
  <rect width="512" height="512" fill="transparent"/><g transform="translate(258 338) scale(2.1)">
    <path d="M -70 -50 C -58 -62, -42 -43, -18 -36 C -36 -31, -56 -25, -70 -16 C -44 -18, -30 -11, -12 -20 L 0 -32 Z"
      fill="#FF2E7A" opacity="0.92"/>
    <ellipse cx="0" cy="-54" rx="15" ry="18" fill="#050508" stroke="#7B838D" stroke-width="2"/>
    <circle cx="8" cy="-57" r="3.8" fill="#00E5FF" filter="url(#softGlow)"/>
    <path d="M -14 -42 C -24 -18, -18 6, -7 30 L 18 30 C 24 4, 18 -22, 8 -42 Z"
      fill="#050508" stroke="#7B838D" stroke-width="2"/>
    <path d="M -9 -18 L -28 14 L -17 18 L -1 -10 Z" fill="#050508" stroke="#7B838D" stroke-width="1.5"/>
    <path d="M 10 -14 L 34 6 L 28 13 L 6 0 Z" fill="#050508" stroke="#7B838D" stroke-width="1.5"/>
    <path d="M -9 28 L -22 66 L -6 66 L 4 30 Z" fill="#050508" stroke="#7B838D" stroke-width="1.5"/>
    <path d="M 12 29 L 23 66 L 38 66 L 24 29 Z" fill="#050508" stroke="#7B838D" stroke-width="1.5"/>
    <rect x="18" y="-6" width="18" height="24" rx="3" fill="#050508" stroke="#00E5FF" stroke-width="2"/>
    <path d="M 22 5 l5 -6 l6 6 l-6 6 Z" fill="none" stroke="#00E5FF" stroke-width="2"/>
  </g>
