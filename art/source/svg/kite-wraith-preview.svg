<svg xmlns="http://www.w3.org/2000/svg" width="512" height="256" viewBox="0 0 512 256">
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.032" numOctaves="3" seed="17"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.11"/>
      </feComponentTransfer>
    </filter>
    <pattern id="rain" width="34" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(14)">
      <line x1="10" y1="0" x2="10" y2="18" stroke="#B9CBE0" stroke-width="1" opacity="0.22"/>
      <line x1="24" y1="6" x2="24" y2="32" stroke="#00E5FF" stroke-width="0.8" opacity="0.12"/>
    </pattern>
    
  </defs>
  <rect width="512" height="256" fill="transparent"/><g transform="translate(248 136) scale(1.4)">
    <path d="M -72 0 C -22 -56, 42 -56, 88 -6 C 34 -18, -8 8, -58 42 Z" fill="#050508" stroke="#00E5FF" stroke-width="4"/>
    <path d="M -16 -22 L 8 -52 L 32 -20 L 10 28 Z" fill="#162435" stroke="#FF2E7A" stroke-width="3"/>
    <path d="M 34 -8 C 72 0, 92 18, 108 46" fill="none" stroke="#00E5FF" stroke-width="5" stroke-linecap="round" opacity="0.74"/>
    <circle cx="12" cy="-18" r="4" fill="#FF2E7A" filter="url(#softGlow)"/>
  </g>
</svg>