<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320">
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.032" numOctaves="3" seed="17"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.11"/>
      </feComponentTransfer>
    </filter>
    <pattern id="rain" width="34" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(14)">
      <line x1="10" y1="0" x2="10" y2="18" stroke="#B9CBE0" stroke-width="1" opacity="0.22"/>
      <line x1="24" y1="6" x2="24" y2="32" stroke="#00E5FF" stroke-width="0.8" opacity="0.12"/>
    </pattern>
    
  </defs>
  <rect width="640" height="320" fill="transparent"/><g transform="translate(28 48)">
      <circle cx="106" cy="106" r="94" fill="#090B10" stroke="#00E5FF" stroke-width="8" opacity="0.95"/>
      <circle cx="106" cy="106" r="42" fill="#11151C" stroke="#7B838D" stroke-width="5"/>
      <path d="M 106 36 L 84 72 H 128 Z M 106 176 L 84 140 H 128 Z M 36 106 L 72 84 V 128 Z M 176 106 L 140 84 V 128 Z"
        fill="#00E5FF" opacity="0.86"/>
      <text x="64" y="242" font-family="Arial Black, Arial, sans-serif" font-size="25" fill="#00E5FF">MOVE</text>
    </g>
    <g transform="translate(360 34)">
      <circle cx="110" cy="190" r="68" fill="#090B10" stroke="#FF2E7A" stroke-width="8"/>
      <path d="M 70 190 C 104 140, 154 146, 184 186 C 142 176, 104 190, 72 226 Z" fill="#FF2E7A" opacity="0.85"/>
      <text x="82" y="200" font-family="Arial Black, Arial, sans-serif" font-size="29" fill="#E8DDC6">SL</text>
      <circle cx="210" cy="82" r="62" fill="#090B10" stroke="#00E5FF" stroke-width="8"/>
      <path d="M 180 96 L 210 48 L 240 96" fill="none" stroke="#00E5FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="188" y="92" font-family="Arial Black, Arial, sans-serif" font-size="26" fill="#E8DDC6">JP</text>
      <circle cx="58" cy="72" r="42" fill="#090B10" stroke="#F0A64A" stroke-width="6"/>
      <rect x="44" y="52" width="8" height="38" fill="#F0A64A"/>
      <rect x="64" y="52" width="8" height="38" fill="#F0A64A"/>
    </g>
</svg>